blueprint:
  name: City Visitor Parking - Automatische Parkeerregistratie
  description: |
    &nbsp;
    Automatiseer bezoekersparkeren via zone-detectie, Bluetooth en mobiele
    notificaties. Werkt volledig op de achtergrond — alleen een melding
    wanneer actie nodig is.
    &nbsp;
    ## Vereisten

    - City Visitor Parking-integratie geïnstalleerd en geconfigureerd

    ## Werking

    - 🚗 **Aankomst in zone** — melding om kenteken aan te melden (Bluetooth vereist)
    - 📵 **Bluetooth verbreekt bij aankomst** — melding verschijnt direct, zonder wachttijd
    - ⏰ **Actieve reservering** — elk uur een herinnering; melding bij externe annulering
    - 🔵 **Bluetooth verbindt in zone** — aankomstmelding ook als BT pas later verbindt
    - 🔵 **Bluetooth verbindt buiten zone** — direct melding om af te melden
    - ⚠️ **Vertrek zonder aanmelding** — persistente waarschuwing

    ## Meer informatie

    - [Integratie documentatie](https://github.com/sir-Unknown/ha_City-Visitor-Parking#readme)
    - [Blueprint documentatie](https://github.com/sir-Unknown/ha_City-Visitor-Parking/blueprints#readme)
  source_url: https://github.com/sir-Unknown/ha_City-Visitor-Parking/blob/main/blueprints/zone_automatic_parking_registration.yaml
  domain: automation
  input:
    parkeerapp:
      name: Parkeerintegratie
      icon: mdi:car
      input:
        parking_device:
          name: Parkeervergunning
          description: Kies het apparaat van de **City Visitor Parking**-integratie dat deze automatisering moet gebruiken. Dit bepaalt voor welke vergunning reserveringen worden gestart, gestopt en gecontroleerd.
          selector:
            device:
              filter:
                - integration: city_visitor_parking


    locatie:
      name: Locatie en voertuig
      icon: mdi:map-marker
      input:
        person_entity:
          name: Persoon
          description: Kies de `person`-entiteit waarvan de locatie wordt gevolgd. Deze wordt gebruikt om aankomst en vertrek in de geselecteerde zone te detecteren.
          selector:
            entity:
              domain: person

        license_plate:
          name: Kenteken
          description: Vul het kenteken in dat moet worden aangemeld. Spaties worden automatisch verwijderd en letters worden omgezet naar **hoofdletters**.
          selector:
            text:

        target_zone:
          name: Zone
          description: "Kies de `zone` waarin de automatisering actief moet worden. Binnenkomen en verlaten van deze zone start de logica voor aankomst en vertrek."
          selector:
            entity:
              domain: zone

        device_tracker:
          name: Device tracker (optioneel)
          description: "Optionele `device_tracker` als extra controle voor aankomst en vertrek. Gebruik dit wanneer alleen de persoon- of zone-trigger niet betrouwbaar genoeg is, bijvoorbeeld bij trage GPS-updates."
          default: ""
          selector:
            entity:
              domain: device_tracker

    telefoon:
      name: Telefoon en Bluetooth
      icon: mdi:cellphone
      input:
        notify_device:
          name: Melding ontvangen op
          description: Kies het mobiele apparaat dat de meldingen en actieknoppen van deze automatisering moet ontvangen.
          selector:
            device:
              filter:
                - integration: mobile_app

        bluetooth_device:
          name: Bluetooth-apparaat
          description: Kies het apparaat waarvan de Bluetooth-status wordt gecontroleerd. Dit mag hetzelfde apparaat zijn als waarop de meldingen binnenkomen.
          selector:
            device:
              filter:
                - integration: mobile_app

        bluetooth_device_name:
          name: Bluetooth apparaatnaam
          description: "Naam van het Bluetooth-apparaat (auto of carkit) zoals zichtbaar in de HA Companion App onder Instellingen → Sensoren → Bluetooth. Vul minimaal dit veld of het MAC-adres in."
          default: ""
          selector:
            text:

        bluetooth_mac_address:
          name: Bluetooth MAC-adres (optioneel)
          description: "MAC-adres van het Bluetooth-apparaat als alternatief of extra controle naast de apparaatnaam. Vul minimaal dit veld of de apparaatnaam in."
          default: ""
          selector:
            text:

        dashboard_url:
          name: Dashboard URL (optioneel)
          description: "URL of pad naar het Home Assistant-dashboard dat geopend wordt via de knop in de melding. Bijvoorbeeld: `/lovelace/parkeren`"
          default: ""
          selector:
            text:

    geavanceerd:
      name: Geavanceerd
      icon: mdi:cog
      collapsed: true
      input:
        notification_timeout:
          name: Wachttijd notificatie
          description: Hoe lang de automatisering wacht op een reactie op een mobiele melding voordat zij verdergaat met de volgende logica.
          default: "00:01:00"
          selector:
            time:

        arrival_delay:
          name: Aankomstvertraging (seconden)
          description: Extra wachttijd na aankomst voordat de reserveringsstatus wordt gecontroleerd. Handig om `GPS`- of Bluetooth-status eerst te laten stabiliseren.
          default: 5
          selector:
            number:
              min: 0
              max: 60
              unit_of_measurement: s

        departure_delay:
          name: Vertrekvertraging (seconden)
          description: Extra wachttijd na vertrek voordat gecontroleerd wordt of de persoon echt uit de zone is en of er nog een reservering actief is.
          default: 30
          selector:
            number:
              min: 0
              max: 120
              unit_of_measurement: s

    teksten:
      name: Teksten en knoppen
      icon: mdi:message-text
      collapsed: true
      input:
        msg_title:
          name: Meldingstitel
          description: Titel die boven alle mobiele meldingen en persistente meldingen van deze blueprint wordt getoond.
          default: Visitor Parking
          selector:
            text:

        msg_arrival:
          name: Tekst - aankomstvraag
          description: "Tekst van de melding bij aankomst. **Beschikbare variabelen:** `{{ license_plate_clean }}`, `{{ start_time_display }}`, `{{ end_time_display }}`. Gebruik `\\n` voor een nieuwe regel."
          default: "U bent gearriveerd. Kenteken {{ license_plate_clean }} aanmelden?"
          selector:
            text:
              multiline: true

        msg_registered:
          name: Tekst - aangemeld
          description: "Bevestigingstekst nadat een reservering is gestart. **Beschikbare variabelen:** `{{ license_plate_clean }}`, `{{ start_time_display }}`, `{{ end_time_display }}`. Gebruik `\\n` voor een nieuwe regel."
          default: "Kenteken {{ license_plate_clean }} is aangemeld tot {{ end_time_display }}."
          selector:
            text:
              multiline: true

        msg_unregistered:
          name: Tekst - afgemeld
          description: "Bevestigingstekst nadat een reservering is gestopt. **Beschikbare variabelen:** `{{ license_plate_clean }}`, `{{ start_time_display }}`, `{{ end_time_display }}`. Gebruik `\\n` voor een nieuwe regel."
          default: "Kenteken {{ license_plate_clean }} is afgemeld."
          selector:
            text:
              multiline: true

        msg_external_cancel:
          name: Tekst - extern afgemeld
          description: "Melding wanneer een reservering buiten deze automatisering om is beëindigd. **Beschikbare variabelen:** `{{ license_plate_clean }}`, `{{ start_time_display }}`, `{{ end_time_display }}`. Gebruik `\\n` voor een nieuwe regel."
          default: "Reservering voor kenteken {{ license_plate_clean }} is niet meer actief."
          selector:
            text:
              multiline: true

        msg_reregistered:
          name: Tekst - opnieuw aangemeld
          description: "Bevestigingstekst nadat opnieuw is aangemeld. **Beschikbare variabelen:** `{{ license_plate_clean }}`, `{{ start_time_display }}`, `{{ end_time_display }}`. Gebruik `\\n` voor een nieuwe regel."
          default: "Kenteken {{ license_plate_clean }} is opnieuw aangemeld tot {{ end_time_display }}."
          selector:
            text:
              multiline: true

        msg_reminder:
          name: Tekst - herinnering (elk uur)
          description: "Herinneringstekst die periodiek wordt verstuurd tijdens een actieve reservering. **Beschikbare variabelen:** `{{ license_plate_clean }}`, `{{ start_time_display }}`, `{{ end_time_display }}`. Gebruik `\\n` voor een nieuwe regel."
          default: "Kenteken {{ license_plate_clean }} staat al 1 uur aangemeld tot {{ end_time_display }}."
          selector:
            text:
              multiline: true

        msg_departure_no_reg:
          name: Tekst - verlaten zonder aanmelding
          description: "Persistente melding wanneer iemand de zone verlaat zonder actieve reservering. **Beschikbare variabelen:** `{{ license_plate_clean }}`, `{{ start_time_display }}`, `{{ end_time_display }}`. Gebruik `\\n` voor een nieuwe regel."
          default: "De persoon verliet de zone zonder kenteken {{ license_plate_clean }} aan te melden."
          selector:
            text:
              multiline: true

        msg_future_reservation:
          name: Tekst - toekomstige reservering
          description: "Melding wanneer al een toekomstige reservering bestaat en een nieuwe registratie daarom wordt overgeslagen. **Beschikbare variabelen:** `{{ license_plate_clean }}`, `{{ start_time_display }}`, `{{ end_time_display }}`. Gebruik `\\n` voor een nieuwe regel."
          default: "Er bestaat al een toekomstige parkeerreservering voor {{ license_plate_clean }}."
          selector:
            text:
              multiline: true

        btn_register:
          name: Knop - aanmelden
          description: Label van de knop waarmee een reservering wordt gestart vanuit een melding.
          default: Aanmelden
          selector:
            text:

        btn_unregister:
          name: Knop - afmelden
          description: Label van de knop waarmee een actieve reservering wordt gestopt.
          default: Afmelden
          selector:
            text:

        btn_reregister:
          name: Knop - opnieuw aanmelden
          description: Label van de knop waarmee een extern beëindigde reservering opnieuw wordt gestart.
          default: Opnieuw aanmelden
          selector:
            text:

        btn_dashboard:
          name: Knop - dashboard
          description: Label van de knop die het opgegeven Home Assistant-dashboard opent.
          default: Dashboard
          selector:
            text:

mode: queued
max: 2

trigger_variables:
  _device_tracker: !input device_tracker
  _target_zone: !input target_zone
  _bluetooth_device: !input bluetooth_device
  _bluetooth_device_name: !input bluetooth_device_name
  _bluetooth_mac: !input bluetooth_mac_address

trigger:
  - platform: zone
    entity_id: !input person_entity
    zone: !input target_zone
    event: enter
    id: arrival

  - platform: zone
    entity_id: !input person_entity
    zone: !input target_zone
    event: leave
    id: departure

  - platform: homeassistant
    event: start
    id: ha_restart

  - platform: template
    value_template: >
      {{ _device_tracker != '' and _target_zone != ''
         and is_state(_device_tracker, _target_zone | replace('zone.', '')) }}
    for: "00:00:30"
    id: arrival

  - platform: template
    value_template: >
      {{ _device_tracker != '' and _target_zone != ''
         and not is_state(_device_tracker, _target_zone | replace('zone.', '')) }}
    for: "00:00:30"
    id: departure

  - platform: template
    value_template: >
      {% set bt_sensor = device_entities(_bluetooth_device)
         | select('search', '_bluetooth_connection') | first | default('') %}
      {% set devices = state_attr(bt_sensor, 'connected_paired_devices') or [] %}
      {{ bt_sensor != '' and (
         (_bluetooth_device_name != '' and (devices | select('search', _bluetooth_device_name) | list | count > 0))
         or (_bluetooth_mac != '' and (devices | select('search', _bluetooth_mac) | list | count > 0))) }}
    for: "00:00:10"
    id: bluetooth_connect

condition: []

action:
  - variables:
      bluetooth_device_id: !input bluetooth_device
      bluetooth_sensor_entity: >
        {{ device_entities(bluetooth_device_id)
           | select('search', '_bluetooth_connection')
           | first | default('') }}
      bluetooth_device_name_value: !input bluetooth_device_name
      bluetooth_mac_address_value: !input bluetooth_mac_address
      license_plate_raw: !input license_plate
      license_plate_clean: "{{ license_plate_raw | upper | replace(' ', '') }}"
      bluetooth_connected: >
        {% set devices = state_attr(bluetooth_sensor_entity, 'connected_paired_devices') or [] %}
        {{ (bluetooth_device_name_value != '' and (devices | select('search', bluetooth_device_name_value) | list | count > 0))
           or (bluetooth_mac_address_value != '' and (devices | select('search', bluetooth_mac_address_value) | list | count > 0)) }}

      instance_key: >
        {{ (this.entity_id | default(this.object_id | default('visitor_parking')))
           | lower
           | replace('.', '_')
           | replace('-', '_')
           | replace(' ', '_') }}

      run_id: "{{ context.id }}"

      notification_tag: "{{ 'visitor_parking_' ~ instance_key }}"
      notification_id_not_registered: "{{ 'visitor_parking_not_registered_' ~ instance_key }}"

      action_start_id: "{{ 'VISITOR_PARKING_START_' ~ run_id }}"
      action_stop_id: "{{ 'VISITOR_PARKING_STOP_' ~ run_id }}"
      action_reregister_id: "{{ 'VISITOR_PARKING_REREGISTER_' ~ run_id }}"

      dashboard_url_value: !input dashboard_url
      btn_register_value: !input btn_register
      btn_unregister_value: !input btn_unregister
      btn_reregister_value: !input btn_reregister
      btn_dashboard_value: !input btn_dashboard

      action_register: >
        {{ [{"action": action_start_id, "title": btn_register_value}]
           + ([{"action": "URI", "title": btn_dashboard_value, "uri": dashboard_url_value}] if dashboard_url_value != '' else []) }}
      action_stop: >
        {{ [{"action": action_stop_id, "title": btn_unregister_value}]
           + ([{"action": "URI", "title": btn_dashboard_value, "uri": dashboard_url_value}] if dashboard_url_value != '' else []) }}
      action_reregister: >
        {{ [{"action": action_reregister_id, "title": btn_reregister_value}]
           + ([{"action": "URI", "title": btn_dashboard_value, "uri": dashboard_url_value}] if dashboard_url_value != '' else []) }}


      notification_icon: mdi:car
      notification_icon_clock: mdi:car-clock
      notification_icon_url: "https://raw.githubusercontent.com/home-assistant/brands/master/custom_integrations/city_visitor_parking/icon.png"

  - if:
      - condition: template
        value_template: "{{ bluetooth_device_name_value == '' and bluetooth_mac_address_value == '' }}"
    then:
      - action: persistent_notification.create
        data:
          notification_id: "{{ 'visitor_parking_config_error_' ~ instance_key }}"
          title: !input msg_title
          message: "Configuratiefout: vul minimaal een Bluetooth-apparaatnaam of MAC-adres in voor deze automatisering."
      - stop: "Bluetooth niet geconfigureerd"

  - choose:
      - conditions:
          - condition: trigger
            id: arrival
          - condition: template
            value_template: "{{ license_plate_clean | length > 0 }}"
          - condition: template
            value_template: "{{ bluetooth_connected }}"
        sequence:
          - wait_for_trigger:
              - platform: template
                value_template: >
                  {% set devices = state_attr(bluetooth_sensor_entity, 'connected_paired_devices') or [] %}
                  {{ not ((bluetooth_device_name_value != '' and (devices | select('search', bluetooth_device_name_value) | list | count > 0))
                     or (bluetooth_mac_address_value != '' and (devices | select('search', bluetooth_mac_address_value) | list | count > 0))) }}
            timeout:
              seconds: !input arrival_delay
            continue_on_timeout: true

          - action: city_visitor_parking.get_status
            data:
              device_id: !input parking_device
            response_variable: parking_status

          - variables:
              window_start: "{{ parking_status.window_start }}"
              window_end: "{{ parking_status.window_end }}"
              start_time_display: >
                {% if parking_status.window_start %}
                  {% set start_dt = parking_status.window_start | as_datetime | as_local %}
                  {% if start_dt.strftime('%H:%M') == '00:00' %}middernacht{% else %}{{ start_dt.strftime('%H:%M') }} uur{% endif %}
                {% else %}
                  nu
                {% endif %}
              end_time_display: >
                {% if parking_status.window_end %}
                  {% set end_dt = parking_status.window_end | as_datetime | as_local %}
                  {% if end_dt.strftime('%H:%M') == '00:00' %}middernacht{% else %}{{ end_dt.strftime('%H:%M') }} uur{% endif %}
                {% else %}
                  onbekend
                {% endif %}

          - variables:
              arrived: false

          - repeat:
              while:
                - condition: zone
                  entity_id: !input person_entity
                  zone: !input target_zone
                - condition: template
                  value_template: "{{ not arrived }}"
              sequence:
                - action: city_visitor_parking.list_reservations
                  data:
                    device_id: !input parking_device
                  response_variable: parking_reservations

                - if:
                    - condition: template
                      value_template: >
                        {{ (parking_reservations.active_count | int(0)) > 0
                           or (parking_reservations.future_count | int(0)) > 0 }}
                  then:
                    - device_id: !input notify_device
                      domain: mobile_app
                      type: notify
                      message: clear_notification
                      data:
                        tag: "{{ notification_tag }}"

                    - if:
                        - condition: template
                          value_template: "{{ (parking_reservations.future_count | int(0)) > 0 }}"
                      then:
                        - device_id: !input notify_device
                          domain: mobile_app
                          type: notify
                          title: !input msg_title
                          message: !input msg_future_reservation
                          data:
                            tag: "{{ notification_tag }}"
                            channel: Parking
                            notification_icon: "{{ notification_icon }}"
                            icon_url: "{{ notification_icon_url }}"
                            clickAction: noAction
                            ttl: 0
                            priority: high
                            importance: max
                            actions: >
                              {{ ([{"action": "URI", "title": btn_dashboard_value, "uri": dashboard_url_value}]
                                 if dashboard_url_value != '' else []) }}

                    - stop: "Reservering aanwezig bij aankomst"

                - device_id: !input notify_device
                  domain: mobile_app
                  type: notify
                  title: !input msg_title
                  message: !input msg_arrival
                  data:
                    tag: "{{ notification_tag }}"
                    channel: Parking
                    notification_icon: "{{ notification_icon }}"
                    icon_url: "{{ notification_icon_url }}"
                    clickAction: noAction
                    ttl: 0
                    priority: high
                    importance: max
                    sticky: true
                    persistent: true
                    confirmation: true
                    actions: "{{ action_register }}"

                - wait_for_trigger:
                    - platform: event
                      event_type: mobile_app_notification_action
                      event_data:
                        action: "{{ action_start_id }}"
                  timeout: !input notification_timeout
                  continue_on_timeout: true

                - variables:
                    arrived: "{{ wait.completed }}"

          - if:
              - condition: template
                value_template: "{{ arrived }}"
            then:
              - action: city_visitor_parking.start_reservation
                data:
                  device_id: !input parking_device
                  license_plate: "{{ license_plate_clean }}"
                  start_time: >
                    {{ window_start if window_start and window_start | as_datetime > now() else now().isoformat() }}
                  end_time: "{{ window_end }}"

              - action: persistent_notification.dismiss
                data:
                  notification_id: "{{ notification_id_not_registered }}"

              - variables:
                  reservation_start: "{{ as_timestamp(now()) | int }}"

              - device_id: !input notify_device
                domain: mobile_app
                type: notify
                title: !input msg_title
                message: !input msg_registered
                data:
                  tag: "{{ notification_tag }}"
                  channel: Parking
                  notification_icon: "{{ notification_icon }}"
                  icon_url: "{{ notification_icon_url }}"
                  clickAction: noAction
                  ttl: 0
                  priority: high
                  importance: max
                  chronometer: true
                  when: "{{ reservation_start }}"
                  sticky: true
                  persistent: true
                  actions: "{{ action_stop }}"

              - repeat:
                  while:
                    - condition: template
                      value_template: "true"
                  sequence:
                    - wait_for_trigger:
                        - platform: event
                          event_type: mobile_app_notification_action
                          event_data:
                            action: "{{ action_stop_id }}"
                      timeout: !input notification_timeout
                      continue_on_timeout: true

                    - choose:
                        # Gebruiker drukt op Afmelden
                        - conditions:
                            - condition: template
                              value_template: >
                                {{ wait.completed
                                   and wait.trigger is not none
                                   and wait.trigger.event is defined
                                   and wait.trigger.event.data is defined
                                   and wait.trigger.event.data.action == action_stop_id }}
                          sequence:
                            - action: city_visitor_parking.list_reservations
                              data:
                                device_id: !input parking_device
                              response_variable: active_parking_reservations

                            - variables:
                                reservation_id: >
                                  {% set items = active_parking_reservations.reservations | default([]) %}
                                  {{ items[0].reservation_id if items | count > 0 else '' }}

                            - choose:
                                - conditions:
                                    - condition: template
                                      value_template: "{{ reservation_id != '' }}"
                                  sequence:
                                    - action: city_visitor_parking.end_reservation
                                      data:
                                        device_id: !input parking_device
                                        reservation_id: "{{ reservation_id }}"

                            - device_id: !input notify_device
                              domain: mobile_app
                              type: notify
                              message: clear_notification
                              data:
                                tag: "{{ notification_tag }}"

                            - device_id: !input notify_device
                              domain: mobile_app
                              type: notify
                              title: !input msg_title
                              message: !input msg_unregistered
                              data:
                                tag: "{{ notification_tag }}"
                                notification_icon: "{{ notification_icon }}"
                                icon_url: "{{ notification_icon_url }}"
                                clickAction: noAction
                                ttl: 0
                                priority: high
                                importance: max

                            - stop: "Afgemeld door gebruiker"

                        # Timeout - controleer reserveringsstatus
                        - conditions:
                            - condition: template
                              value_template: "{{ not wait.completed }}"
                          sequence:
                            - action: city_visitor_parking.list_reservations
                              data:
                                device_id: !input parking_device
                              response_variable: poll_reservations

                            - choose:
                                # Reservering extern afgemeld
                                - conditions:
                                    - condition: template
                                      value_template: >
                                        {{ (poll_reservations.active_count | int(0)) == 0 }}
                                  sequence:
                                    - device_id: !input notify_device
                                      domain: mobile_app
                                      type: notify
                                      title: !input msg_title
                                      message: !input msg_external_cancel
                                      data:
                                        tag: "{{ notification_tag }}"
                                        channel: Parking
                                        notification_icon: "{{ notification_icon }}"
                                        icon_url: "{{ notification_icon_url }}"
                                        clickAction: noAction
                                        ttl: 0
                                        priority: high
                                        importance: max
                                        sticky: true
                                        persistent: true
                                        actions: "{{ action_reregister }}"

                                    - wait_for_trigger:
                                        - platform: event
                                          event_type: mobile_app_notification_action
                                          event_data:
                                            action: "{{ action_reregister_id }}"
                                      timeout: !input notification_timeout
                                      continue_on_timeout: true

                                    - if:
                                        - condition: template
                                          value_template: "{{ wait.completed }}"
                                      then:
                                        - action: city_visitor_parking.start_reservation
                                          data:
                                            device_id: !input parking_device
                                            license_plate: "{{ license_plate_clean }}"
                                            start_time: >
                                              {{ window_start if window_start and window_start | as_datetime > now() else now().isoformat() }}
                                            end_time: "{{ window_end }}"

                                        - variables:
                                            reservation_start: "{{ as_timestamp(now()) | int }}"

                                        - device_id: !input notify_device
                                          domain: mobile_app
                                          type: notify
                                          title: !input msg_title
                                          message: !input msg_reregistered
                                          data:
                                            tag: "{{ notification_tag }}"
                                            channel: Parking
                                            notification_icon: "{{ notification_icon }}"
                                            icon_url: "{{ notification_icon_url }}"
                                            clickAction: noAction
                                            ttl: 0
                                            priority: high
                                            importance: max
                                            chronometer: true
                                            when: "{{ reservation_start }}"
                                            sticky: true
                                            persistent: true
                                            actions: "{{ action_stop }}"
                                      else:
                                        - device_id: !input notify_device
                                          domain: mobile_app
                                          type: notify
                                          message: clear_notification
                                          data:
                                            tag: "{{ notification_tag }}"
                                        - stop: "Reservering extern afgemeld, geen herregistratie"

                                # Reservering actief, stuur herinnering als het tijd is
                                - conditions:
                                    - condition: template
                                      value_template: >
