documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "docs/**"

tests:
  - changed-files:
      - any-glob-to-any-file:
          - "tests/**"

testing:
  - head-branch: ["testing"]

ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"

maintenance:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
