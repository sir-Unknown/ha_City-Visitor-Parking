# Weekly job (every Monday 06:00 UTC) that checks if Home Assistant Core has
# bumped its minimum Python version. When a new minor version is detected, a
# PR is opened automatically that updates the following targets in pyproject.toml:
#   - project.requires-python
#   - tool.mypy.python_version
#   - tool.pyright.pythonVersion
#   - tool.ruff.target-version
#
# If a bump branch already exists the job pushes to it instead of creating a
# duplicate PR.
name: Sync Python version from HA Core

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday at 06:00 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  sync:
    name: Sync Python version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # Required to push the version-bump branch back to the repository.
      pull-requests: write # Required to open or inspect the pull request for the bump branch.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Fetch HA core Python version
        id: ha_core
        run: |
          parse_minor() {
            awk -F. '{ if (NF >= 2) print $1 "." $2; else print $1 }' <<<"$1"
          }
          VERSION=$(curl -fsSL \
            "https://raw.githubusercontent.com/home-assistant/core/dev/.python-version" \
            | tr -d '[:space:]')
          MINOR="$(parse_minor "$VERSION")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"

      - name: Read current Python version
        id: current
        run: |
          parse_minor() {
            awk -F. '{ if (NF >= 2) print $1 "." $2; else print $1 }' <<<"$1"
          }
          FULL=$(sed -n 's/^requires-python = ">=\([0-9][0-9.]*\)"$/\1/p' pyproject.toml)
          if [ -z "$FULL" ]; then
            echo "Could not read requires-python from pyproject.toml"
            exit 1
          fi
          MINOR="$(parse_minor "$FULL")"
          echo "version=$FULL" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"

      - name: Open PR if version changed
        if: steps.ha_core.outputs.minor != steps.current.outputs.minor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.ha_core.outputs.version }}
          NEW_MINOR: ${{ steps.ha_core.outputs.minor }}
          OLD_VERSION: ${{ steps.current.outputs.version }}
          OLD_MINOR: ${{ steps.current.outputs.minor }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="bump/python-${NEW_VERSION}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          sed -E -i "s/^(requires-python = \">=)[0-9]+\.[0-9.]+(\")$/\1${NEW_VERSION}\2/" pyproject.toml

          # Update tooling targets if major.minor changed (e.g. 3.14 → 3.15)
          if [ "$NEW_MINOR" != "$OLD_MINOR" ]; then
            NEW_RUFF_MINOR="${NEW_MINOR//./}"
            sed -E -i "s/^(python_version = \")[0-9]+\.[0-9]+(\")/\1${NEW_MINOR}\2/" pyproject.toml
            sed -E -i "s/^(pythonVersion = \")[0-9]+\.[0-9]+(\")/\1${NEW_MINOR}\2/" pyproject.toml
            sed -E -i "s/^(target-version = \"py)[0-9]+(\")/\1${NEW_RUFF_MINOR}\2/" pyproject.toml
          fi

          git add pyproject.toml
          if ! git diff --cached --quiet; then
            git commit -m "Bump Python version to ${NEW_VERSION}"
            git push origin "$BRANCH"
          else
            echo "No file changes to commit for ${NEW_VERSION}"
          fi

          EXISTING_PR="$(gh pr list \
            --state open \
            --base main \
            --head "$BRANCH" \
            --json number \
            --jq '.[0].number // empty')"
          if [ -n "$EXISTING_PR" ]; then
            echo "Open PR #$EXISTING_PR already exists for $BRANCH. Skipping PR creation."
            exit 0
          fi

          gh pr create \
            --title "Bump Python version to ${NEW_VERSION}" \
            --label "maintenance,no-stale" \
            --body "$(cat <<EOF
          ## Sync Python version from HA Core

          Home Assistant Core bumped from Python \`${OLD_VERSION}\` to \`${NEW_VERSION}\`.

          **Source:** [\`home-assistant/core\` dev branch](https://github.com/home-assistant/core/blob/dev/.python-version)

          ### Changes
          - \`pyproject.toml\`: \`requires-python\` \`>=${OLD_VERSION}\` → \`>=${NEW_VERSION}\`$([ "$NEW_MINOR" != "$OLD_MINOR" ] && echo "
          - \`pyproject.toml\`: \`tool.mypy.python_version\`, \`tool.pyright.pythonVersion\`, \`tool.ruff.target-version\` updated to \`${NEW_MINOR}\`" || echo "")

          ### Checklist
          - [ ] CI passes
          - [ ] Verify compatibility with \`${NEW_VERSION}\`
          EOF
          )" \
            --head "$BRANCH" \
            --base main

      - name: Already up to date
        if: steps.ha_core.outputs.minor == steps.current.outputs.minor
        env:
          CURRENT_VERSION: ${{ steps.current.outputs.version }}
        run: echo "Python version is already aligned at $CURRENT_VERSION; nothing to do."
