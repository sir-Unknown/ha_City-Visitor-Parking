name: Sync Python version from HA Core

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday at 06:00 UTC
  workflow_dispatch:

permissions: {}

jobs:
  sync:
    name: Sync Python version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Fetch and compare Python versions
        id: versions
        run: |
          parse_minor() {
            awk -F. '{ if (NF >= 2) print $1 "." $2; else print $1 }' <<<"$1"
          }
          read_current_version() {
            sed -n 's/^requires-python = \">=\\([0-9][0-9.]*\\)\"$/\\1/p' pyproject.toml
          }
          HA_VERSION=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://raw.githubusercontent.com/home-assistant/core/dev/.python-version" \
            | tr -d '[:space:]')
          CURRENT_VERSION=$(read_current_version)
          if [ -z "$CURRENT_VERSION" ]; then
            echo "Could not read requires-python from pyproject.toml"
            exit 1
          fi
          echo "version=$HA_VERSION" >> "$GITHUB_OUTPUT"
          echo "minor=$(parse_minor "$HA_VERSION")" >> "$GITHUB_OUTPUT"
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "current_minor=$(parse_minor "$CURRENT_VERSION")" >> "$GITHUB_OUTPUT"

      - name: Open PR if version changed
        if: steps.versions.outputs.minor != steps.versions.outputs.current_minor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.versions.outputs.version }}
          NEW_MINOR: ${{ steps.versions.outputs.minor }}
          OLD_VERSION: ${{ steps.versions.outputs.current_version }}
          OLD_MINOR: ${{ steps.versions.outputs.current_minor }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="bump/python-${NEW_VERSION}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          # Update tooling targets if major.minor changed (e.g. 3.14 â†’ 3.15)
          if [ "$NEW_MINOR" != "$OLD_MINOR" ]; then
            NEW_RUFF_MINOR="${NEW_MINOR//./}"
            sed -E -i "s/^(requires-python = \">=)[0-9]+\.[0-9.]+(\")$/\1${NEW_MINOR}\2/" pyproject.toml
            sed -E -i "s/^(python_version = \")[0-9]+\.[0-9]+(\")/\1${NEW_MINOR}\2/" pyproject.toml
            sed -E -i "s/^(pythonVersion = \")[0-9]+\.[0-9]+(\")/\1${NEW_MINOR}\2/" pyproject.toml
            sed -E -i "s/^(target-version = \"py)[0-9]+(\")/\1${NEW_RUFF_MINOR}\2/" pyproject.toml
          fi

          git add pyproject.toml
          if ! git diff --cached --quiet; then
            git commit -m "Bump Python version to ${NEW_VERSION}"
            git push origin "$BRANCH"
          else
            echo "No file changes to commit for ${NEW_VERSION}"
          fi

          EXISTING_PR="$(gh pr list \
            --state open \
            --base main \
            --head "$BRANCH" \
            --json number \
            --jq '.[0].number // empty')"
          if [ -n "$EXISTING_PR" ]; then
            echo "Open PR #$EXISTING_PR already exists for $BRANCH. Skipping PR creation."
            exit 0
          fi

          gh pr create \
            --title "Bump Python version to ${NEW_VERSION}" \
            --body "$(cat <<EOF
          ## Sync Python version from HA Core

          Home Assistant Core bumped from Python \`${OLD_VERSION}\` to \`${NEW_VERSION}\`.

          **Source:** [\`home-assistant/core\` dev branch](https://github.com/home-assistant/core/blob/dev/.python-version)

          ### Changes
          - \`pyproject.toml\`: \`requires-python\` \`>=${OLD_MINOR}\` â†’ \`>=${NEW_MINOR}\`$([ "$NEW_MINOR" != "$OLD_MINOR" ] && echo "
          - \`pyproject.toml\`: \`tool.mypy.python_version\`, \`tool.pyright.pythonVersion\`, \`tool.ruff.target-version\` updated to \`${NEW_MINOR}\`" || echo "")

          ### Checklist
          - [ ] CI passes
          - [ ] Verify compatibility with \`${NEW_VERSION}\`
          EOF
          )" \
            --head "$BRANCH" \
            --base main

      - name: Already up to date
        if: steps.versions.outputs.minor == steps.versions.outputs.current_minor
        env:
          CURRENT_VERSION: ${{ steps.versions.outputs.current_version }}
        run: echo "Python version is already aligned at $CURRENT_VERSION; nothing to do."
