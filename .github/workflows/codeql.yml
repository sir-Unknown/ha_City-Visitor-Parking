# Static analysis via GitHub CodeQL for Python source, JavaScript/TypeScript
# frontend code, and GitHub Actions workflows. Runs the security-extended +
# security-and-quality query suites and uploads findings as SARIF to GitHub
# code scanning.
#
# Custom query config is in .github/codeql/codeql-config.yml.
# Only triggers on changes to relevant paths to avoid unnecessary runs on docs
# or other non-code changes. All workflow files are included because this
# workflow also analyzes language: actions.
name: "CodeQL Advanced"

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "custom_components/**"
      - "tests/**"
      - ".github/workflows/**"
      - ".github/codeql/**"
  pull_request:
    branches: ["main"]
    paths:
      - "custom_components/**"
      - "tests/**"
      - ".github/workflows/**"
      - ".github/codeql/**"
  schedule:
    - cron: "17 12 * * 1"

concurrency:
  group: codeql-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      security-events: write # Required for CodeQL and SARIF uploads.
      packages: read # Required for private-action and package metadata reads during analysis.
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: "/language:${{matrix.language}}"
