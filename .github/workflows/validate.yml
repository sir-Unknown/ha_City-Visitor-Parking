#
# Validates code quality, integration metadata, release policy, and frontend
# assets. The jobs are kept separate so required checks stay easy to scan in the
# GitHub UI.
name: Validate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches: [main, testing]
    tags:
      - "*"
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/dependabot.yml"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/dependabot.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  python_quality:
    name: Python quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: false

      - name: Ruff check
        run: uv run --python "$(sed -n 's/^requires-python = \">=\\([0-9][0-9.]*\\)\"$/\\1/p' pyproject.toml)" --only-group dev ruff check .

      - name: Ruff format check
        run: uv run --python "$(sed -n 's/^requires-python = \">=\\([0-9][0-9.]*\\)\"$/\\1/p' pyproject.toml)" --only-group dev ruff format --check .

  hassfest:
    name: Integration metadata (Hassfest)
    needs: [python_quality]
    if: ${{ github.ref_name != 'testing' && !(contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run hassfest validation
        uses: home-assistant/actions/hassfest@f6f29a7ee3fa0eccadf3620a7b9ee00ab54ec03b # master

  hacs:
    name: Integration metadata (HACS)
    needs: [python_quality]
    if: ${{ github.ref_name != 'testing' && !(contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run HACS validation
        uses: hacs/action@d556e736723344f83838d08488c983a15381059a # 22.5.0
        with:
          category: integration
        env:
          REPOSITORY_REF: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

  python_tests:
    name: Python tests
    needs: [python_quality]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: false

      - name: Install dependencies
        run: uv sync --python "$(sed -n 's/^requires-python = \">=\\([0-9][0-9.]*\\)\"$/\\1/p' pyproject.toml)" --group test --no-install-project

      - name: Run pytest (with coverage)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: uv run pytest tests/components/city_visitor_parking --cov=custom_components.city_visitor_parking --cov-report=term-missing

  release_policy:
    name: Release policy
    if: ${{ github.ref_name != 'testing' && !(contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check pycityvisitorparking version sync (manifest.json vs pyproject.toml)
        run: |
          python3 - <<'PYEOF'
          import json, tomllib, sys, pathlib
          from packaging.requirements import Requirement

          manifest = json.loads(pathlib.Path("custom_components/city_visitor_parking/manifest.json").read_text())
          with open("pyproject.toml", "rb") as f:
              pyproject = tomllib.load(f)

          def find_pycvp(deps):
              for d in deps:
                  try:
                      req = Requirement(d)
                  except Exception:
                      continue
                  if req.name.lower() == "pycityvisitorparking":
                      return req
              return None

          manifest_req = find_pycvp(manifest["requirements"])
          pyproject_req = find_pycvp(pyproject.get("project", {}).get("dependencies", []))

          if manifest_req is None or pyproject_req is None:
              print("::warning::pycityvisitorparking not found in requirements — skipping sync check.")
              sys.exit(0)

          if manifest_req.url or pyproject_req.url:
              print("::warning::Non-PyPI pycityvisitorparking requirement — skipping sync check.")
              sys.exit(0)

          def eq_version(req, source):
              versions = [s.version for s in req.specifier if s.operator == "=="]
              if not versions:
                  print(f"::error::{source}: pycityvisitorparking must use == pinning, got: {req}")
                  sys.exit(1)
              return versions[0]

          manifest_ver = eq_version(manifest_req, "manifest.json")
          pyproject_ver = eq_version(pyproject_req, "pyproject.toml")

          print(f"manifest.json  : {manifest_ver}")
          print(f"pyproject.toml : {pyproject_ver}")

          if manifest_ver != pyproject_ver:
              print(f"::error::pycityvisitorparking version mismatch: manifest.json={manifest_ver}, pyproject.toml={pyproject_ver}. Keep these in sync.")
              sys.exit(1)
          PYEOF

      - name: Check pycityvisitorparking version in manifest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          LATEST=$(python3 - <<'PYEOF'
          import urllib.request, json, time, sys
          for attempt in range(3):
              try:
                  with urllib.request.urlopen(
                      "https://pypi.org/pypi/pycityvisitorparking/json", timeout=15
                  ) as r:
                      print(json.load(r)["info"]["version"])
                      sys.exit(0)
              except Exception as e:
                  if attempt == 2:
                      print(f"::warning::Could not reach PyPI after 3 attempts: {e} — skipping version check.", file=sys.stderr)
                      sys.exit(2)
                  time.sleep(10)
          PYEOF
          ) || exit 0
          MANIFEST=$(python3 - <<'PYEOF'
          import json, sys
          data = json.load(open('custom_components/city_visitor_parking/manifest.json'))
          pkg = next((r for r in data['requirements'] if r.startswith('pycityvisitorparking==')), None)
          if pkg is None:
              print("::warning::manifest.json uses a non-PyPI requirement for pycityvisitorparking — skipping version check.", file=sys.stderr)
              sys.exit(2)
          print(pkg.split('==')[1])
          PYEOF
          ) || exit 0
          echo "Latest on PyPI : $LATEST"
          echo "In manifest.json: $MANIFEST"
          if [ "$LATEST" != "$MANIFEST" ]; then
            if [ -n "$PR_NUMBER" ]; then
              EXISTING=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" \
                --jq '[.[] | select(.state == "CHANGES_REQUESTED" and .user.login == "github-actions[bot]")] | length')
              if [ "$EXISTING" -eq 0 ]; then
                gh pr review "$PR_NUMBER" \
                  --request-changes \
                  --body "**\`manifest.json\` is out of date.**
          \`pycityvisitorparking\` is pinned at \`$MANIFEST\` but the latest release on PyPI is \`$LATEST\`.
          Please update \`requirements\` in \`manifest.json\` before merging."
              fi
            fi
            echo "::error::manifest.json uses pycityvisitorparking==$MANIFEST but latest release on PyPI is $LATEST."
            exit 1
          else
            if [ -n "$PR_NUMBER" ]; then
              gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" \
                --jq '.[] | select(.state == "CHANGES_REQUESTED" and .user.login == "github-actions[bot]") | .id' \
              | while read -r ID; do
                  gh api "repos/$REPO/pulls/$PR_NUMBER/reviews/$ID/dismissals" \
                    -X PUT -f message="pycityvisitorparking is now up to date in manifest.json."
                done
            fi
          fi

  frontend_quality:
    name: Frontend quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: custom_components/city_visitor_parking/frontend
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        run: yarn install --immutable

      - name: Clean frontend dist
        run: rm -rf dist

      - name: Build frontend
        run: yarn build

      - name: Lint frontend
        run: yarn lint

      - name: Test frontend
        run: yarn test
