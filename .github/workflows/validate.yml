name: Validate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches: [main]
    tags:
      - "*"
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/dependabot.yml"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/dependabot.yml"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  ruff:
    name: Ruff (lint/format)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: false

      - name: Ruff check
        run: uv run --python "$(sed -n 's/^requires-python = \">=\\([0-9][0-9.]*\\)\"$/\\1/p' pyproject.toml)" --only-group dev ruff check .

      - name: Ruff format check
        run: uv run --python "$(sed -n 's/^requires-python = \">=\\([0-9][0-9.]*\\)\"$/\\1/p' pyproject.toml)" --only-group dev ruff format --check .

  hassfest:
    name: Hassfest validation
    needs: [ruff]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run hassfest validation
        uses: home-assistant/actions/hassfest@5752577ea7cc5aefb064b0b21432f18fe4d6ba90 # master

  hacs:
    name: HACS validation
    needs: [ruff]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run HACS validation
        uses: hacs/action@d556e736723344f83838d08488c983a15381059a # 22.5.0
        with:
          category: integration
        env:
          REPOSITORY_REF: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

  tests:
    name: Pytest
    needs: [ruff]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: false

      - name: Install dependencies
        run: uv sync --python "$(sed -n 's/^requires-python = \">=\\([0-9][0-9.]*\\)\"$/\\1/p' pyproject.toml)" --group test --no-install-project

      - name: Run pytest (with coverage)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: uv run pytest tests/components/city_visitor_parking --cov=custom_components.city_visitor_parking --cov-report=term-missing

  manifest-version:
    name: Manifest Python package version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check pycityvisitorparking version in manifest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          LATEST=$(python3 - <<'PYEOF'
          import urllib.request, json, time, sys
          for attempt in range(3):
              try:
                  with urllib.request.urlopen(
                      "https://pypi.org/pypi/pycityvisitorparking/json", timeout=15
                  ) as r:
                      print(json.load(r)["info"]["version"])
                      sys.exit(0)
              except Exception as e:
                  if attempt == 2:
                      print(f"::warning::Could not reach PyPI after 3 attempts: {e} — skipping version check.", file=sys.stderr)
                      sys.exit(2)
                  time.sleep(10)
          PYEOF
          ) || exit 0
          MANIFEST=$(python3 -c "
          import json
          data = json.load(open('custom_components/city_visitor_parking/manifest.json'))
          pkg = next(r for r in data['requirements'] if r.startswith('pycityvisitorparking=='))
          print(pkg.split('==')[1])
          ")
          echo "Latest on PyPI : $LATEST"
          echo "In manifest.json: $MANIFEST"
          if [ "$LATEST" != "$MANIFEST" ]; then
            echo "::warning::manifest.json uses pycityvisitorparking==$MANIFEST but latest release is $LATEST."
            if [ -n "$PR_NUMBER" ]; then
              EXISTING=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" \
                --jq '[.[] | select(.state == "CHANGES_REQUESTED" and .user.login == "github-actions[bot]")] | length')
              if [ "$EXISTING" -eq 0 ]; then
                gh pr review "$PR_NUMBER" \
                  --request-changes \
                  --body "**\`manifest.json\` is out of date.**
          \`pycityvisitorparking\` is pinned at \`$MANIFEST\` but the latest release on PyPI is \`$LATEST\`.
          Please update \`requirements\` in \`manifest.json\` before merging."
              fi
            fi
          else
            if [ -n "$PR_NUMBER" ]; then
              gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" \
                --jq '.[] | select(.state == "CHANGES_REQUESTED" and .user.login == "github-actions[bot]") | .id' \
              | while read -r ID; do
                  gh api "repos/$REPO/pulls/$PR_NUMBER/reviews/$ID/dismissals" \
                    -X PUT -f message="pycityvisitorparking is now up to date in manifest.json."
                done
            fi
          fi

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: custom_components/city_visitor_parking/frontend
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        run: yarn install --immutable

      - name: Clean frontend dist
        run: rm -rf dist

      - name: Build frontend
        run: yarn build

      - name: Lint frontend
        run: yarn lint

      - name: Test frontend
        run: yarn test
