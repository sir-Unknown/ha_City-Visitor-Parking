name: Validate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches: [main]
    tags:
      - "*"
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/dependabot.yml"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/dependabot.yml"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  ruff:
    name: Ruff (lint/format)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: false

      - name: Ruff check
        run: uv run --python "$(cat .python-version)" --with-requirements requirements-dev.txt ruff check .

      - name: Ruff format check
        run: uv run --python "$(cat .python-version)" --with-requirements requirements-dev.txt ruff format --check .

  hassfest:
    name: Hassfest validation
    needs: [ruff]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run hassfest validation
        uses: home-assistant/actions/hassfest@5752577ea7cc5aefb064b0b21432f18fe4d6ba90 # master

  hacs:
    name: HACS validation
    needs: [ruff]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run HACS validation
        uses: hacs/action@d556e736723344f83838d08488c983a15381059a # 22.5.0
        with:
          category: integration
        env:
          REPOSITORY_REF: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

  tests:
    name: Pytest
    needs: [ruff]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: false

      - name: Create uv-managed virtual environment
        run: uv venv --python "$(cat .python-version)"

      - name: Install dependencies
        run: uv pip install --python .venv/bin/python -r requirements.txt -r requirements_test.txt pytest-cov

      - name: Run pytest (with coverage)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: .venv/bin/pytest tests/components/city_visitor_parking --cov=custom_components.city_visitor_parking --cov-report=term-missing

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: custom_components/city_visitor_parking/frontend
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        run: yarn install --immutable

      - name: Clean frontend dist
        run: rm -rf dist

      - name: Build frontend
        run: yarn build

      - name: Lint frontend
        run: yarn lint

      - name: Test frontend
        run: yarn test
