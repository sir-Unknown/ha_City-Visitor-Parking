# Security audit of all GitHub Actions workflows using zizmor. Findings are
# uploaded as SARIF to GitHub code scanning so they appear in the Security tab.
#
# The zizmor step allows exit codes 0 (clean) and 1 (findings) — findings are
# visible via the SARIF upload in the Security tab. Exit codes >= 2 (crashes)
# still fail the job. The upload step runs with `if: always()` to ensure SARIF
# is uploaded even when zizmor reports findings.
name: Zizmor

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - ".github/codeql/**"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - ".github/codeql/**"
  schedule:
    - cron: "0 6 * * 1" # every Monday at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  zizmor:
    name: Check GitHub Actions workflows
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # Required to upload SARIF findings into GitHub code scanning.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Run zizmor
        run: uvx zizmor@1.23.1 --format sarif . > zizmor.sarif || [ $? -eq 1 ]

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: zizmor.sarif
          category: zizmor
