# Automatically assigns newly opened issues and pull requests to the maintainer
# (sir-Unknown) so nothing falls through the cracks without an owner.
name: Auto-assign

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  assign:
    name: Assign to maintainer
    runs-on: ubuntu-latest
    permissions:
      issues: write # Required to add an assignee when a new issue is opened.
      pull-requests: write # Required to add an assignee when a new pull request is opened.
    steps:
      - name: Assign to sir-Unknown
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: ['sir-Unknown'],
            });
