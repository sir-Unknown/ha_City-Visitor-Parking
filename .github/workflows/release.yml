# Builds and uploads the integration zip to a GitHub Release when one is
# published. Also handles testing pre-releases by injecting the correct
# pyCityVisitorParking commit SHA from the release body.
#
# Flow:
#   1. Verify that the Validate workflow passed on the release commit.
#   2. Detect whether custom_components/ changed since the previous release.
#   3. Build the frontend, assemble the zip, and upload it to the release.
#
# Responsibility split:
#   - pr-labeling.yml manages PR labels.
#   - release-drafter.yml prepares release drafts and notes.
#   - This workflow builds the release artifact for an already-published release.
name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to process (e.g. v1.0.0-testing.1)"
        required: true
        type: string

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Check validate status
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      release_sha: ${{ steps.resolve_tag.outputs.sha }}
      should_release: ${{ steps.component_changes.outputs.should_release }}
      tag: ${{ steps.resolve_tag.outputs.tag }}
    steps:
      - name: Resolve release tag to commit
        id: resolve_tag
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `tags/${tag}`,
            });
            let sha = ref.object.sha;
            if (ref.object.type === "tag") {
              const { data: tagObject } = await github.rest.git.getTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_sha: ref.object.sha,
              });
              sha = tagObject.object.sha;
            }
            core.setOutput("sha", sha);
            core.setOutput("tag", tag);

      - name: Detect custom_components changes since previous release
        id: component_changes
        env:
          RELEASE_SHA: ${{ steps.resolve_tag.outputs.sha }}
          RELEASE_TAG: ${{ steps.resolve_tag.outputs.tag }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const currentTag = process.env.RELEASE_TAG;
            const currentSha = process.env.RELEASE_SHA;

            async function resolveTagSha(tag) {
              const { data: ref } = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });

              if (ref.object.type === "tag") {
                const { data: tagObject } = await github.rest.git.getTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_sha: ref.object.sha,
                });
                return tagObject.object.sha;
              }

              return ref.object.sha;
            }

            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const previousRelease = releases.find(
              (release) =>
                !release.draft &&
                !release.prerelease &&
                release.tag_name !== currentTag,
            );

            if (!previousRelease) {
              core.info("No previous published release found; proceeding with release.");
              core.setOutput("should_release", "true");
              return;
            }

            const previousSha = await resolveTagSha(previousRelease.tag_name);
            const comparison = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: previousSha,
              head: currentSha,
            });

            const changed = (comparison.data.files ?? []).some((file) =>
              file.filename.startsWith("custom_components/"),
            );

            core.info(
              `Previous release: ${previousRelease.tag_name}; custom_components changed: ${changed}`,
            );
            core.setOutput("should_release", changed ? "true" : "false");

      - name: Verify Validate workflow success
        env:
          RELEASE_SHA: ${{ steps.resolve_tag.outputs.sha }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const workflowName = "Validate";
            const sha = process.env.RELEASE_SHA;
            const { data: workflows } = await github.rest.actions.listRepoWorkflows({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const workflow = workflows.workflows.find((item) => item.name === workflowName);
            if (!workflow) {
              core.setFailed(`Workflow not found: ${workflowName}`);
              return;
            }

            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflow.id,
              head_sha: sha,
              per_page: 100,
            });
            const successful = runs.workflow_runs.find(
              (run) => run.status === "completed" && run.conclusion === "success",
            );
            if (!successful) {
              const summary = runs.workflow_runs
                .map((run) => `${run.status}/${run.conclusion || "none"} (${run.html_url})`)
                .join(", ");
              core.setFailed(
                `No successful Validate run found for ${sha}. Runs: ${summary || "none"}`,
              );
            }

  build-release:
    needs: [validate]
    if: needs.validate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.validate.outputs.release_sha }}
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Enable Corepack
        run: corepack enable
      - name: Install frontend dependencies
        run: yarn install --immutable
        working-directory: custom_components/city_visitor_parking/frontend
      - name: Build frontend
        run: yarn build
        working-directory: custom_components/city_visitor_parking/frontend
      - name: Normalize release version
        id: version
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: |
          version="${RELEASE_TAG,,}"
          version="${version#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Fetch release body
        id: release_body
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: |
          body=$(gh release view "$RELEASE_TAG" --json body --jq '.body')
          {
            echo "body<<RELEASE_BODY_EOF"
            echo "$body"
            echo "RELEASE_BODY_EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Extract pyCityVisitorParking ref from release body
        if: contains(needs.validate.outputs.tag, '-testing.') || contains(needs.validate.outputs.tag, '-beta.')
        id: pycvp
        env:
          RELEASE_BODY: ${{ steps.release_body.outputs.body }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: |
          IS_BETA=false
          if echo "$RELEASE_TAG" | grep -q '\-beta\.'; then
            IS_BETA=true
          fi

          COMMIT=$(echo "$RELEASE_BODY" | grep -oE '\*\*Commit:\*\* `?([a-f0-9]{40})`?' | grep -oE '[a-f0-9]{40}')
          PYPI=$(echo "$RELEASE_BODY" | grep -oE '\*\*PyPI:\*\* `?([^` \n]+)`?' | sed 's/\*\*PyPI:\*\* //; s/`//g')

          # Ignore placeholder values
          echo "$COMMIT" | grep -qiE '^(FILL_IN|$)' && COMMIT=""
          echo "$PYPI"   | grep -qiE '^(FILL_IN|$)' && PYPI=""

          if [ "$IS_BETA" = "true" ]; then
            if [ -n "$PYPI" ] && [ -n "$COMMIT" ]; then
              echo "::error::Fill in either PyPI version or Commit SHA, not both."
              exit 1
            fi
            if [ -z "$PYPI" ] && [ -z "$COMMIT" ]; then
              echo "::error::Fill in either 'PyPI' or 'Commit' in the beta release draft."
              exit 1
            fi
          else
            # testing: commit is required
            if [ -z "$COMMIT" ]; then
              echo "::error::No pyCityVisitorParking commit found in release body. Fill in the 'Commit' field in the release draft."
              exit 1
            fi
          fi

          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "pypi=$PYPI" >> "$GITHUB_OUTPUT"
          [ -n "$COMMIT" ] && echo "Found pyCityVisitorParking commit: $COMMIT" || true
          [ -n "$PYPI" ]   && echo "Found pyCityVisitorParking PyPI version: $PYPI" || true

      - name: Build release asset
        id: build
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PYCVP_COMMIT: ${{ steps.pycvp.outputs.commit }}
          PYCVP_PYPI: ${{ steps.pycvp.outputs.pypi }}
        run: |
          mkdir /tmp/release-build
          git -C custom_components/city_visitor_parking archive --format=tar \
            --worktree-attributes HEAD | tar -x -C /tmp/release-build
          python3 - <<'PYEOF'
          import json, os, pathlib, re
          p = pathlib.Path("/tmp/release-build/manifest.json")
          data = json.loads(p.read_text())
          data["version"] = os.environ["VERSION"]
          pycvp_commit = os.environ.get("PYCVP_COMMIT", "")
          pycvp_pypi = os.environ.get("PYCVP_PYPI", "")
          if pycvp_commit:
              new_reqs = []
              replaced = False
              for r in data["requirements"]:
                  if re.search(r'pycityvisitorparking', r, re.IGNORECASE):
                      # Replace existing git SHA or PyPI version with the given commit
                      if re.search(r'[a-f0-9]{40}', r):
                          r_new = re.sub(r'[a-f0-9]{40}', pycvp_commit, r)
                      else:
                          r_new = re.sub(r'pycityvisitorparking==\S+', f'pycityvisitorparking @ git+https://github.com/sir-Unknown/pyCityVisitorParking@{pycvp_commit}', r, flags=re.IGNORECASE)
                      if r_new != r:
                          replaced = True
                          r = r_new
                  new_reqs.append(r)
              if not replaced:
                  raise ValueError("No pycityvisitorparking requirement found to replace")
              data["requirements"] = new_reqs
          elif pycvp_pypi:
              new_reqs = [re.sub(r'pycityvisitorparking==\S+', f'pycityvisitorparking=={pycvp_pypi}', r) for r in data["requirements"]]
              if new_reqs == data["requirements"]:
                  raise ValueError("No pycityvisitorparking==... requirement found to replace")
              data["requirements"] = new_reqs
          # Derive a human-readable version label for the release notes
          pycvp_req = next((r for r in data["requirements"] if re.search(r'pycityvisitorparking', r, re.IGNORECASE)), "")
          sha_match = re.search(r'[a-f0-9]{40}', pycvp_req)
          pypi_match = re.search(r'pycityvisitorparking==(\S+)', pycvp_req, re.IGNORECASE)
          repo = "https://github.com/sir-Unknown/pyCityVisitorParking"
          if sha_match:
              sha = sha_match.group(0)
              pycvp_version = f"[{sha[:7]}]({repo}/commit/{sha})"
          elif pypi_match:
              ver = pypi_match.group(1)
              pycvp_version = f"[{ver}]({repo}/releases/tag/{ver})"
          else:
              pycvp_version = pycvp_req
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"pycvp_version={pycvp_version}\n")
          p.write_text(json.dumps(data, indent=2) + "\n")
          PYEOF
          cd /tmp/release-build && zip -r "$GITHUB_WORKSPACE/city_visitor_parking.zip" .
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: gh release upload "$RELEASE_TAG" city_visitor_parking.zip --clobber
      - name: Update release body with pyCityVisitorParking version
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          PYCVP_VERSION: ${{ steps.build.outputs.pycvp_version }}
        run: |
          body=$(gh release view "$RELEASE_TAG" --json body --jq '.body')
          updated=$(echo "$body" | sed "s|PYCVP_VERSION_PLACEHOLDER|${PYCVP_VERSION}|g")
          gh release edit "$RELEASE_TAG" --notes "$updated"

  skip-release:
    needs: [validate]
    if: needs.validate.outputs.should_release != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip release packaging
        run: |
          echo "No changes under custom_components/** since the previous published release."
          echo "Skipping release asset build."
