name: Release

on:
  release:
    types:
      - published

permissions: {}

jobs:
  validate:
    name: Check validate status
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      release_sha: ${{ steps.resolve_tag.outputs.sha }}
    steps:
      - name: Resolve release tag to commit
        id: resolve_tag
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const tag = context.payload.release.tag_name;
            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `tags/${tag}`,
            });
            let sha = ref.object.sha;
            if (ref.object.type === "tag") {
              const { data: tagObject } = await github.rest.git.getTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_sha: ref.object.sha,
              });
              sha = tagObject.object.sha;
            }
            core.setOutput("sha", sha);

      - name: Verify Validate workflow success
        env:
          RELEASE_SHA: ${{ steps.resolve_tag.outputs.sha }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const workflowName = "Validate";
            const sha = process.env.RELEASE_SHA;
            const { data: workflows } = await github.rest.actions.listRepoWorkflows({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const workflow = workflows.workflows.find((item) => item.name === workflowName);
            if (!workflow) {
              core.setFailed(`Workflow not found: ${workflowName}`);
              return;
            }

            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflow.id,
              head_sha: sha,
              per_page: 100,
            });
            const successful = runs.workflow_runs.find(
              (run) => run.status === "completed" && run.conclusion === "success",
            );
            if (!successful) {
              const summary = runs.workflow_runs
                .map((run) => `${run.status}/${run.conclusion || "none"} (${run.html_url})`)
                .join(", ");
              core.setFailed(
                `No successful Validate run found for ${sha}. Runs: ${summary || "none"}`,
              );
            }

  build-release:
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.validate.outputs.release_sha }}
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Enable Corepack
        run: corepack enable
      - name: Install frontend dependencies
        run: yarn install --immutable
        working-directory: custom_components/city_visitor_parking/frontend
      - name: Build frontend
        run: yarn build
        working-directory: custom_components/city_visitor_parking/frontend
      - name: Normalize release version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          version="${RELEASE_TAG,,}"
          version="${version#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Build release asset
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir /tmp/release-build
          git -C custom_components/city_visitor_parking archive --format=tar \
            --worktree-attributes HEAD | tar -x -C /tmp/release-build
          python3 - <<PYEOF
          import json, pathlib
          p = pathlib.Path("/tmp/release-build/manifest.json")
          data = json.loads(p.read_text())
          data["version"] = "$VERSION"
          p.write_text(json.dumps(data, indent=2) + "\n")
          PYEOF
          cd /tmp/release-build && zip -r "$GITHUB_WORKSPACE/city_visitor_parking.zip" .
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" city_visitor_parking.zip --clobber
      - name: Publish release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id,
              draft: false,
            });

  bump-manifest-version:
    needs: [validate, build-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Bump version in manifest.json
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const tag = context.payload.release.tag_name;
            const version = "${{ needs.build-release.outputs.version }}";
            const path = "custom_components/city_visitor_parking/manifest.json";
            const branch = `chore/bump-manifest-version-${version}`;

            const { data: mainRef } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: "heads/main",
            });

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${branch}`,
              sha: mainRef.object.sha,
            });

            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              ref: "main",
            });

            const manifest = JSON.parse(Buffer.from(file.content, "base64").toString());
            if (manifest.version === version) return;
            manifest.version = version;
            const newContent = JSON.stringify(manifest, null, 2) + "\n";

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              message: `chore: bump manifest version to ${version}`,
              content: Buffer.from(newContent).toString("base64"),
              sha: file.sha,
              branch,
            });

            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore: bump manifest version to ${version}`,
              head: branch,
              base: "main",
              body: `Automated version bump following release ${tag}.`,
            });
