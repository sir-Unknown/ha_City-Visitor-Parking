# Maintains a draft GitHub Release that is kept up-to-date with every push to
# main or testing that touches custom_components/. The draft is populated using
# the rules in .github/release-drafter.yml (categories, version bump strategy,
# etc.). When a release is ready, the draft is manually published which triggers
# the release.yml workflow to build and upload the release asset.
name: Release Drafter

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
      - testing
    paths:
      - custom_components/**
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - .github/**
      - blueprints/**
      - tests/**
      - "**/*.md"
      - custom_components/**
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Pre-release type (beta or testing). Leave empty for a stable draft."
        required: false
        default: ""
        type: choice
        options:
          - ""
          - beta
          - testing
      version:
        description: "Version override (e.g. 0.1.35). Leave empty to auto-resolve from manifest.json."
        required: false
        type: string
      suffix:
        description: "Build metadata suffix (e.g. dvsportal_new). Leave empty to omit."
        required: false
        type: string

permissions: {}

concurrency:
  group: release-drafter-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  autolabel_pull_requests:
    name: autolabel_pull_requests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Run Release Drafter autolabeler (main)
        if: github.event.pull_request.base.ref == 'main'
        uses: release-drafter/release-drafter@139054aeaa9adc52ab36ddf67437541f039b88e2 # v7.1.1
        with:
          disable-releaser: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run Release Drafter autolabeler (testing)
        if: github.event.pull_request.base.ref == 'testing'
        uses: release-drafter/release-drafter@139054aeaa9adc52ab36ddf67437541f039b88e2 # v7.1.1
        with:
          config-name: release-drafter-testing.yml
          disable-releaser: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

  update_release_draft:
    name: update_release_draft
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write # Required to read PR titles/labels and apply autolabeler labels.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Release Drafter (stable)
        if: github.ref_name == 'main' && inputs.prerelease == ''
        uses: release-drafter/release-drafter@139054aeaa9adc52ab36ddf67437541f039b88e2 # v7.1.1
        with:
          version: ${{ inputs.version }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Get next beta version
        if: github.ref_name == 'main' && inputs.prerelease == 'beta'
        id: next_beta_version
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_SUFFIX: ${{ inputs.suffix }}
        run: |
          if [ -n "${INPUT_VERSION}" ]; then
            BASE="${INPUT_VERSION}"
          else
            MANIFEST_VERSION=$(jq -r '.version' custom_components/city_visitor_parking/manifest.json | sed 's/-.*//')
            if [ "${MANIFEST_VERSION}" = "0.0.0" ]; then
              BASE=$(gh release list --limit 1000 --json tagName,isPrerelease \
                --jq '[.[] | select(.isPrerelease == false) | .tagName] | first' \
                | sed 's/^v//')
            else
              BASE="${MANIFEST_VERSION}"
            fi
          fi
          LAST=$(gh release list --limit 1000 --json tagName --jq '.[].tagName' \
            | grep -E "^v${BASE}-beta\.[0-9]+(\+.*)?$" \
            | grep -oE "beta\.[0-9]+" \
            | grep -oE "[0-9]+$" \
            | sort -n | tail -1)
          NEXT=$((${LAST:-0} + 1))
          if [ -n "${INPUT_SUFFIX}" ]; then
            echo "version=${BASE}-beta.${NEXT}+${INPUT_SUFFIX}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${BASE}-beta.${NEXT}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Release Drafter (beta pre-release)
        if: github.ref_name == 'main' && inputs.prerelease == 'beta'
        uses: release-drafter/release-drafter@139054aeaa9adc52ab36ddf67437541f039b88e2 # v7.1.1
        with:
          config-name: release-drafter-beta.yml
          prerelease: true
          version: ${{ steps.next_beta_version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Get next testing version
        if: github.ref_name == 'testing'
        id: next_version
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_SUFFIX: ${{ inputs.suffix }}
        run: |
          if [ -n "${INPUT_VERSION}" ]; then
            BASE="${INPUT_VERSION}"
          else
            MANIFEST_VERSION=$(jq -r '.version' custom_components/city_visitor_parking/manifest.json | sed 's/-.*//')
            if [ "${MANIFEST_VERSION}" = "0.0.0" ]; then
              BASE=$(gh release list --limit 1000 --json tagName,isPrerelease \
                --jq '[.[] | select(.isPrerelease == false) | .tagName] | first' \
                | sed 's/^v//')
            else
              BASE="${MANIFEST_VERSION}"
            fi
          fi
          LAST=$(gh release list --limit 1000 --json tagName --jq '.[].tagName' \
            | grep -E "^v${BASE}-testing\.[0-9]+(\+.*)?$" \
            | grep -oE "testing\.[0-9]+" \
            | grep -oE "[0-9]+$" \
            | sort -n | tail -1)
          NEXT=$((${LAST:-0} + 1))
          if [ -n "${INPUT_SUFFIX}" ]; then
            echo "version=${BASE}-testing.${NEXT}+${INPUT_SUFFIX}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${BASE}-testing.${NEXT}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Release Drafter (pre-release)
        if: github.ref_name == 'testing'
        uses: release-drafter/release-drafter@139054aeaa9adc52ab36ddf67437541f039b88e2 # v7.1.1
        with:
          config-name: release-drafter-testing.yml
          prerelease: true
          version: ${{ steps.next_version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
