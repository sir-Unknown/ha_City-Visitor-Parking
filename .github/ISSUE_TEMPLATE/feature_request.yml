name: Feature request
description: Suggest an improvement or new feature
labels: ["enhancement"]
assignees: ["sir-Unknown"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this feature solve? What use case does it enable?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like to see this implemented?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you have considered?
    validations:
      required: false
