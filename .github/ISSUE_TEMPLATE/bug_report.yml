name: Bug report
description: Report a problem with the City Visitor Parking integration
labels: ["bug"]
assignees: ["sir-Unknown"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill in as much detail as possible to help us reproduce and fix the issue.

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "2025.3.0"
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: Integration version
      placeholder: "1.2.3"
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "3.14.0"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Enable debug logging for `custom_components.city_visitor_parking` and paste relevant lines here.
      render: text
    validations:
      required: false
