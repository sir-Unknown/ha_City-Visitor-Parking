name-template: "$NEXT_PATCH_VERSION"
tag-template: "$NEXT_PATCH_VERSION"
commitish: "main"
change-template: "- $TITLE (#$NUMBER)"
no-changes-template: "- No changes"
categories:
  - title: "⚠️ Breaking Changes"
    labels:
      - "breaking-change"
  - title: "Added"
    labels:
      - "new-feature"
  - title: "Fixed"
    labels:
      - "bugfix"
  - title: "Changed"
    labels:
      - "maintenance"
      - "enhancement"
      - "refactor"
      - "performance"
      - "ci"
      - "dependencies"
  - title: "Tests"
    labels:
      - "tests"
  - title: "Docs"
    labels:
      - "documentation"
autolabeler:
  - label: "documentation"
    files:
      - "**/*.md"
      - "docs/**"
  - label: "tests"
    files:
      - "tests/**"
  - label: "maintenance"
    files:
      - ".github/**"
template: |
  $CHANGES
