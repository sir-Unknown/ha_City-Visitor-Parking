name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
commitish: "testing"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
no-changes-template: "- No changes in `custom_components/**` since the last release."
exclude-labels:
  - "skip-changelog"
  - "duplicate"
  - "invalid"
sort-direction: ascending
include-paths:
  - "custom_components/"
categories:
  - title: "рџљЁ Breaking changes"
    labels:
      - "breaking-change"
  - title: "вњЁ New features"
    labels:
      - "new-feature"
  - title: "рџђ› Bug fixes"
    labels:
      - "bugfix"
  - title: "рџљЂ Enhancements"
    labels:
      - "enhancement"
      - "refactor"
      - "performance"
  - title: "рџ§° Maintenance"
    labels:
      - "maintenance"
      - "ci"
  - title: "в¬†пёЏ Dependency updates"
    labels:
      - "dependencies"
  - title: "рџ§Є Tests"
    labels:
      - "tests"
  - title: "рџ“љ Documentation"
    labels:
      - "documentation"
autolabeler:
  - label: "documentation"
    files:
      - "**/*.md"
  - label: "tests"
    files:
      - "tests/**"
  - label: "maintenance"
    files:
      - ".github/**"
